<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Cartões · Histórico de Compras</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f0c1f 0%, #1a1730 100%);
            color: #f0eaff;
            min-height: 100vh;
            margin: 0;
            padding: 24px 20px 120px;
        }

        h1 {
            text-align: center;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff 0%, #c1b3ff 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* GRADE DE CARDS */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 28px;
            max-width: 1400px;
            margin: 0 auto 40px auto;
        }

        /* RODAPÉ COM TOTAL GASTO NO MÊS */
        .total-month-footer {
            background: rgba(45, 40, 75, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 20px 35px;
            max-width: 600px;
            margin: 40px auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(200, 180, 255, 0.3);
            box-shadow: 0 8px 30px rgba(0,0,0,0.7);
            position: relative;
            bottom: 0;
        }
        .total-label {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            color: #ddd9ff;
        }
        .total-label span { font-size: 1.4rem; }
        .total-value {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CARD PRINCIPAL */
        .credit-card {
            background: rgba(25, 20, 45, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid rgba(210, 180, 255, 0.15);
            box-shadow: 0 20px 40px -15px #00000080, 0 0 0 1px rgba(255, 230, 255, 0.05) inset;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative; /* Necessário para o selo PAGO */
            overflow: hidden;
        }

        .credit-card:hover {
            transform: scale(1.01);
            border-color: rgba(170, 130, 240, 0.5);
        }

        /* cabeçalho */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 12px;
        }
        .bank-name {
            font-weight: 700;
            font-size: 1.4rem;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .actions { display: flex; gap: 8px; }
        .action-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #ddd;
            width: 34px;
            height: 34px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:hover { background: #6d5ac9; color: white; }
        .action-btn.delete:hover { background: #ff5a5a; }

        /* área de totais */
        .totals-grid {
            background: rgba(0,0,0,0.25);
            border-radius: 22px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .bill-main {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .bill-label { font-size: 0.9rem; opacity: 0.7; }
        .bill-value {
            font-size: 2rem;
            font-weight: 700;
            color: #ffa270;
        }
        .limit-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
        }
        .available-positive { color: #9effb4; font-weight: 600; }
        .available-warning { color: #ffd966; font-weight: 600; }
        .available-negative { color: #ff8a8a; font-weight: 600; }
        
        .limit-bar {
            height: 8px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            overflow: hidden;
            margin: 4px 0;
        }
        .limit-fill {
            height: 100%;
            background: linear-gradient(90deg, #b3ffaa, #f9d773, #ff8a8a);
            border-radius: 20px;
            transition: width 0.3s;
        }

        /* info adicional */
        .info-dates {
            display: flex;
            gap: 16px;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.03);
            padding: 10px 14px;
            border-radius: 40px;
            justify-content: space-around;
        }

        /* HISTÓRICO DE COMPRAS */
        .purchases-section {
            background: rgba(10, 8, 22, 0.6);
            border-radius: 22px;
            padding: 14px;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            margin-bottom: 12px;
            opacity: 0.9;
        }
        .purchase-item {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #6d5ac9;
        }
        .purchase-desc { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .purchase-name { font-weight: 600; font-size: 1rem; }
        .purchase-installment { font-size: 0.75rem; opacity: 0.7; }
        .purchase-price { text-align: right; font-weight: 700; color: #f0c4a0; margin-right: 10px; }
        .purchase-actions { display: flex; gap: 6px; }
        .purchase-edit-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #ccc;
            width: 30px;
            height: 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .purchase-edit-btn:hover { background: #7e6ad6; color: white; }
        .purchase-edit-btn.delete:hover { background: #ff5a5a; color: white; }

        .btn-add-purchase {
            background: rgba(255,255,240,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            color: #bbb;
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 8px;
            transition: 0.2s;
        }
        .btn-add-purchase:hover { background: #3f3a6b; color: white; }

        /* preview da próxima fatura */
        .next-bill-preview {
            background: #2d264d;
            border-radius: 18px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
            border: 1px solid #5f4b9e;
        }
        .next-bill-value { font-weight: 800; font-size: 1.3rem; color: #f2c94c; }

        /* BOTÃO PAGAR */
        .btn-pay {
            background: white;
            color: #1a1a2e;
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }
        .btn-pay:hover { background: #cfc3ff; }
        
        /* ESTADO PAGO */
        .paid .btn-pay {
            background: #2d2d3f;
            color: #aaa;
            pointer-events: none;
        }
        .paid .bill-value {
            color: #87d68d;
            text-decoration: line-through;
        }

        /* selo pago */
        .paid::after {
            content: "PAGO ✓";
            position: absolute;
            top: 20px;
            right: -30px;
            background: #1f8b4c;
            color: white;
            padding: 5px 45px;
            transform: rotate(45deg);
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 0 4px 10px black;
            z-index: 5;
        }

        /* FAB */
        .fab-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 64px;
            height: 64px;
            background: #9f7aff;
            border: none;
            border-radius: 50%;
            font-size: 2.2rem;
            color: black;
            cursor: pointer;
            box-shadow: 0 6px 20px #7f5fd0;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .fab-add:hover { transform: scale(1.1); background: #b8a2ff; }

        /* MODAIS */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-active { display: flex; }
        .modal-content {
            background: #26223b;
            padding: 30px;
            border-radius: 30px;
            max-width: 450px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title { font-size: 1.5rem; font-weight: 600; }
        .close-modal {
            background: none; border: none; color: white; font-size: 2rem; cursor: pointer;
        }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 6px; opacity: 0.8; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid #4a3f70;
            background: #19162b;
            color: white;
        }
        
        .btn-actions-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn-save {
            background: #9f7aff;
            color: black;
            font-weight: bold;
            padding: 14px;
            flex: 1;
            border-radius: 40px;
            border: none;
            cursor: pointer;
        }
        
        .btn-delete-modal {
            background: #ff5a5a;
            color: white;
            font-weight: bold;
            padding: 14px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            width: 50px; /* Largura fixa para ícone */
            display: none; /* Só aparece se estiver editando */
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Responsividade ajuste */
        @media (max-width: 400px) {
            .card-container { grid-template-columns: 1fr; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<h1>💳 Meus Cartões</h1>

<div class="card-container" id="cardContainer"></div>

<div class="total-month-footer" id="totalMonthContainer">
    <div class="total-label"><span>💰</span> Total do Mês:</div>
    <span class="total-value" id="totalMonthValue">R$ 0,00</span>
</div>

<button class="fab-add" onclick="openCardModal()">+</button>

<!-- MODAL CARD -->
<div class="modal-overlay" id="modalCard">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title" id="modalCardTitle">💳 Novo Cartão</span>
            <button class="close-modal" onclick="closeCardModal()">×</button>
        </div>
        <form onsubmit="saveCard(event)">
            <input type="hidden" id="cardId">
            <div class="input-group"><label>Banco</label><input id="bankName" placeholder="Ex: Nubank" required></div>
            <div class="input-group"><label>Limite Total (R$)</label><input type="number" id="totalLimit" placeholder="5000" required></div>
            <div class="input-group"><label>Fechamento</label><input id="closeDate" placeholder="Ex: 10" required></div>
            <div class="input-group"><label>Vencimento</label><input id="dueDate" placeholder="Ex: 20" required></div>
            
            <div class="btn-actions-row">
                <button class="btn-delete-modal" id="btnDeleteCard" onclick="deleteCard()" type="button">🗑️</button>
                <button class="btn-save" type="submit">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL COMPRA -->
<div class="modal-overlay" id="modalPurchase">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title" id="modalPurchaseTitle">🛒 Nova Compra</span>
            <button class="close-modal" onclick="closePurchaseModal()">×</button>
        </div>
        <form onsubmit="savePurchase(event)">
            <input type="hidden" id="purchaseCardId">
            <input type="hidden" id="purchaseId">
            <div class="input-group"><label>Descrição</label><input id="purchaseDesc" placeholder="Ex: Mercado" required></div>
            <div class="input-group"><label>Valor total (R$)</label><input type="number" id="purchaseAmount" step="0.01" placeholder="150.00" required></div>
            <div class="input-group"><label>Parcelas</label><select id="purchaseInstallments">
                <option value="1">À vista (1x)</option>
                <option value="2">2x</option>
                <option value="3">3x</option>
                <option value="4">4x</option>
                <option value="5">5x</option>
                <option value="6">6x</option>
                <option value="7">7x</option>
                <option value="8">8x</option>
                <option value="9">9x</option>
                <option value="10">10x</option>
                <option value="11">11x</option>
                <option value="12">12x</option>
            </select></div>
            
            <div class="btn-actions-row">
                <button class="btn-delete-modal" id="btnDeletePurchase" onclick="deletePurchase()" type="button">🗑️</button>
                <button class="btn-save" type="submit">Salvar Compra</button>
            </div>
        </form>
    </div>
</div>

<script>
    // ========== SISTEMA DE PERSISTÊNCIA ==========
    const STORAGE_KEY = 'creditCardAppData';

    // Tenta carregar dados do LocalStorage, senão usa o padrão
    let cards = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
        {
            id: 1, bank: 'Nubank', limit: 6000, close: '12', due: '22', paid: false,
            purchases: [
                { id: 'p1', desc: 'Mercado Livre', amount: 576.50, installments: 1 },
                { id: 'p2', desc: 'Celular parcelado', amount: 500, installments: 2 },
                { id: 'p3', desc: 'Tênis', amount: 300, installments: 3 }
            ]
        },
        {
            id: 2, bank: 'Itaú', limit: 2000, close: '05', due: '15', paid: false,
            purchases: [ { id: 'p4', desc: 'Almoço', amount: 89.90, installments: 1 } ]
        },
        {
            id: 3, bank: 'Inter', limit: 10000, close: '28', due: '07', paid: true,
            purchases: []
        }
    ];

    let nextId = cards.length > 0 ? Math.max(...cards.map(c => c.id)) + 1 : 1;
    let purchaseNextId = 100;
    
    // Inicializa IDs internos de compra para evitar duplicatas
    cards.forEach(card => {
        card.purchases.forEach(p => {
            const numId = parseInt(p.id.replace('p', ''));
            if(numId >= purchaseNextId) purchaseNextId = numId + 1;
        });
    });

    // Função para salvar no LocalStorage
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
    }

    // helpers
    const formatBR = (val) => val.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const currency = (val) => `R$ ${formatBR(val)}`;

    // CORREÇÃO LÓGICA:
    // 1. Fatura Atual: Soma das parcelas do mês.
    // 2. Limite Usado: Soma do VALOR TOTAL das compras (o banco "trava" o total antecipadamente).
    
    function calculateCurrentBill(purchases) {
        let total = 0;
        purchases.forEach(p => {
            const parcela = p.amount / p.installments;
            total += parcela;
        });
        return total;
    }

    // Calcula o quanto do limite está comprometido (Valor Total das dívidas)
    function calculateTotalDebt(purchases) {
        return purchases.reduce((sum, p) => sum + p.amount, 0);
    }

    // Previsão próxima fatura (considerando que as parcelas continuam)
    // Simplificação: Assume que todas as parcelas atuais terão continuidade
    function calculateNextBillPreview(purchases) {
        let next = 0;
        purchases.forEach(p => {
            if (p.installments > 1) {
                const parcela = p.amount / p.installments;
                next += parcela;
            }
        });
        return next;
    }

    function calculateTotalMonth() {
        let total = 0;
        cards.forEach(card => {
            total += calculateCurrentBill(card.purchases);
        });
        return total;
    }

    function updateTotalMonth() {
        const total = calculateTotalMonth();
        document.getElementById('totalMonthValue').innerText = currency(total);
    }

    // render completo
    function render() {
        const container = document.getElementById('cardContainer');
        container.innerHTML = '';

        cards.forEach(card => {
            const currentBill = calculateCurrentBill(card.purchases);
            const totalDebt = calculateTotalDebt(card.purchases); // Usado para calculo do limite
            
            const available = card.limit - totalDebt;
            // Limita a porcentagem da barra entre 0 e 100
            const usedPercent = Math.max(0, Math.min((totalDebt / card.limit) * 100, 100));
            const nextPreview = calculateNextBillPreview(card.purchases);
            
            let availableClass = 'available-positive';
            if (available < 0) availableClass = 'available-negative';
            else if (available < card.limit * 0.2) availableClass = 'available-warning';

            const cardDiv = document.createElement('div');
            cardDiv.className = `credit-card ${card.paid ? 'paid' : ''}`;

            // lista compras
            let purchasesHtml = '';
            card.purchases.forEach(p => {
                const parcela = p.amount / p.installments;
                const parcelaInfo = p.installments > 1 ? `${p.installments}x de ${currency(parcela)}` : 'à vista';
                purchasesHtml += `
                    <div class="purchase-item">
                        <div class="purchase-desc">
                            <span class="purchase-name">${p.desc}</span>
                            <span class="purchase-installment">${parcelaInfo}</span>
                        </div>
                        <div class="purchase-price">${currency(p.amount)}</div>
                        <div class="purchase-actions">
                            <button class="purchase-edit-btn" onclick="editPurchase('${p.id}', ${card.id})">✏️</button>
                        </div>
                    </div>
                `;
            });

            cardDiv.innerHTML = `
                <div>
                    <div class="card-header">
                        <span class="bank-name">🏦 ${card.bank}</span>
                        <div class="actions">
                            <button class="action-btn" onclick="editCard(${card.id})">✏️</button>
                        </div>
                    </div>
                    <div class="totals-grid">
                        <div class="bill-main">
                            <span class="bill-label">Fatura atual</span>
                            <span class="bill-value">${currency(currentBill)}</span>
                        </div>
                        <div class="limit-row">
                            <span>Limite total</span>
                            <span>${currency(card.limit)}</span>
                        </div>
                        <div class="limit-row">
                            <span>Disponível</span>
                            <span class="${availableClass}">${currency(available)}</span>
                        </div>
                        <div class="limit-bar"><div class="limit-fill" style="width: ${usedPercent}%"></div></div>
                        <div class="info-dates">
                            <span>📅 Fecha dia ${card.close}</span>
                            <span>📅 Vence dia ${card.due}</span>
                        </div>
                    </div>

                    <div class="purchases-section">
                        <div class="section-title">🛒 Compras</div>
                        ${purchasesHtml || '<div style="opacity:0.4; padding:8px; text-align:center;">Nenhuma compra registrada</div>'}
                        <button class="btn-add-purchase" onclick="openPurchaseModal(${card.id})">🛍️ Nova compra</button>
                    </div>

                    <div class="next-bill-preview">
                        <span>📆 Próxima fatura (prev.)</span>
                        <span class="next-bill-value">${currency(nextPreview)}</span>
                    </div>
                </div>
                <button class="btn-pay" onclick="togglePaid(${card.id})">${card.paid ? 'Pago ✓' : '💰 Marcar como pago'}</button>
            `;
            container.appendChild(cardDiv);
        });

        updateTotalMonth();
    }

    // modais de cartão
    function openCardModal(editId = null) {
        const modal = document.getElementById('modalCard');
        const deleteBtn = document.getElementById('btnDeleteCard');
        
        modal.classList.add('modal-active');
        document.getElementById('modalCardTitle').innerText = editId ? 'Editar Cartão' : '💳 Novo Cartão';
        
        // Mostra ou esconde botão deletar
        deleteBtn.style.display = editId ? 'flex' : 'none';

        if (editId) {
            const c = cards.find(c => c.id == editId);
            if (c) {
                document.getElementById('cardId').value = c.id;
                document.getElementById('bankName').value = c.bank;
                document.getElementById('totalLimit').value = c.limit;
                document.getElementById('closeDate').value = c.close;
                document.getElementById('dueDate').value = c.due;
            }
        } else {
            document.getElementById('cardId').value = '';
            document.getElementById('bankName').value = '';
            document.getElementById('totalLimit').value = '';
            document.getElementById('closeDate').value = '';
            document.getElementById('dueDate').value = '';
        }
    }
    function closeCardModal() { document.getElementById('modalCard').classList.remove('modal-active'); }
    function editCard(id) { openCardModal(id); }

    function saveCard(e) {
        e.preventDefault();
        const id = document.getElementById('cardId').value;
        const bank = document.getElementById('bankName').value;
        const limit = parseFloat(document.getElementById('totalLimit').value);
        const close = document.getElementById('closeDate').value;
        const due = document.getElementById('dueDate').value;

        if (id) {
            const index = cards.findIndex(c => c.id == id);
            cards[index] = { ...cards[index], bank, limit, close, due };
        } else {
            cards.push({
                id: nextId++,
                bank, limit, close, due,
                paid: false,
                purchases: []
            });
        }
        saveData(); // Salva alteração
        render();
        closeCardModal();
    }

    function deleteCard() {
        const id = document.getElementById('cardId').value;
        if(id && confirm("Tem certeza que deseja excluir este cartão e todo seu histórico?")) {
            cards = cards.filter(c => c.id != id);
            saveData();
            render();
            closeCardModal();
        }
    }

    // modal compra
    function openPurchaseModal(cardId, purchaseId = null) {
        const modal = document.getElementById('modalPurchase');
        const deleteBtn = document.getElementById('btnDeletePurchase');
        
        modal.classList.add('modal-active');
        document.getElementById('purchaseCardId').value = cardId;
        
        // Mostra ou esconde botão deletar
        deleteBtn.style.display = purchaseId ? 'flex' : 'none';
        
        if (purchaseId) {
            document.getElementById('modalPurchaseTitle').innerText = '✏️ Editar Compra';
            const card = cards.find(c => c.id === cardId);
            const purchase = card.purchases.find(p => p.id === purchaseId);
            if (purchase) {
                document.getElementById('purchaseId').value = purchase.id;
                document.getElementById('purchaseDesc').value = purchase.desc;
                document.getElementById('purchaseAmount').value = purchase.amount;
                document.getElementById('purchaseInstallments').value = purchase.installments;
            }
        } else {
            document.getElementById('modalPurchaseTitle').innerText = '🛒 Nova Compra';
            document.getElementById('purchaseId').value = '';
            document.getElementById('purchaseDesc').value = '';
            document.getElementById('purchaseAmount').value = '';
            document.getElementById('purchaseInstallments').value = '1';
        }
    }
    
    function editPurchase(purchaseId, cardId) {
        openPurchaseModal(cardId, purchaseId);
    }

    function closePurchaseModal() { document.getElementById('modalPurchase').classList.remove('modal-active'); }

    function savePurchase(e) {
        e.preventDefault();
        const cardId = parseInt(document.getElementById('purchaseCardId').value);
        const purchaseId = document.getElementById('purchaseId').value;
        const desc = document.getElementById('purchaseDesc').value;
        const amount = parseFloat(document.getElementById('purchaseAmount').value);
        const installments = parseInt(document.getElementById('purchaseInstallments').value);

        const card = cards.find(c => c.id === cardId);
        if (!card) return;

        if (purchaseId) {
            const purchase = card.purchases.find(p => p.id === purchaseId);
            if (purchase) {
                purchase.desc = desc;
                purchase.amount = amount;
                purchase.installments = installments;
            }
        } else {
            card.purchases.push({
                id: 'p' + purchaseNextId++,
                desc, amount, installments
            });
        }

        // Ao salvar compra, garantimos que o status 'pago' seja desmarcado se houver nova movimentação
        // card.paid = false; 
        
        saveData(); // Salva alteração
        render();
        closePurchaseModal();
    }

    function deletePurchase() {
        const cardId = parseInt(document.getElementById('purchaseCardId').value);
        const purchaseId = document.getElementById('purchaseId').value;
        
        if(purchaseId && confirm("Excluir esta compra?")) {
            const card = cards.find(c => c.id === cardId);
            if(card) {
                card.purchases = card.purchases.filter(p => p.id !== purchaseId);
                saveData();
                render();
                closePurchaseModal();
            }
        }
    }

    function togglePaid(id) {
        const card = cards.find(c => c.id === id);
        if (card) { 
            card.paid = !card.paid; 
            saveData(); // Salva alteração
            render(); 
        }
    }

    // inicialização
    render();
</script>
</body>
</html>
